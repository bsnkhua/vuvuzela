name: Release

on:
  push:
    tags: ['v*']

jobs:
  release:
    runs-on: macos-15
    permissions:
      contents: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4

      - name: Import Developer ID certificate
        env:
          MACOS_CERTIFICATE: ${{ secrets.MACOS_CERTIFICATE }}
          MACOS_CERTIFICATE_PWD: ${{ secrets.MACOS_CERTIFICATE_PWD }}
        run: |
          echo "$MACOS_CERTIFICATE" | base64 --decode > /tmp/cert.p12
          security create-keychain -p "" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "" build.keychain
          security import /tmp/cert.p12 -k build.keychain -P "$MACOS_CERTIFICATE_PWD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple: -s -k "" build.keychain
          rm /tmp/cert.p12

      - name: Build release binary
        run: swift build -c release --disable-sandbox

      - name: Assemble and sign app bundle
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          APP="dist/Vuvuzela.app"
          mkdir -p "$APP/Contents/MacOS"
          cp .build/release/Vuvuzela "$APP/Contents/MacOS/Vuvuzela"
          cp Resources/Info.plist "$APP/Contents/Info.plist"
          mkdir -p "$APP/Contents/Resources"
          cp Resources/AppIcon.icns "$APP/Contents/Resources/AppIcon.icns"
          codesign --force --options runtime \
            --sign "Developer ID Application: Serhii Bezbabnykh ($APPLE_TEAM_ID)" \
            "$APP"

      - name: Create DMG
        run: |
          mkdir -p dist/dmg_contents
          cp -R "dist/Vuvuzela.app" dist/dmg_contents/
          ln -s /Applications dist/dmg_contents/Applications
          hdiutil create \
            -volname "Vuvuzela" \
            -srcfolder dist/dmg_contents \
            -ov -format UDZO \
            dist/Vuvuzela.dmg

      - name: Notarize DMG
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          xcrun notarytool submit dist/Vuvuzela.dmg \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_APP_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" \
            --wait

      - name: Staple notarization ticket
        run: xcrun stapler staple dist/Vuvuzela.dmg

      - name: Sign DMG for Sparkle
        env:
          SPARKLE_PRIVATE_KEY: ${{ secrets.SPARKLE_PRIVATE_KEY }}
        run: |
          SPARKLE_VERSION=$(python3 -c "import json; p=json.load(open('Package.resolved')); print(next(x['state']['version'] for x in p['pins'] if x['identity']=='sparkle'))")
          curl -fsSL "https://github.com/sparkle-project/Sparkle/releases/download/${SPARKLE_VERSION}/Sparkle-${SPARKLE_VERSION}.tar.xz" \
            -o /tmp/sparkle.tar.xz
          tar -xf /tmp/sparkle.tar.xz -C /tmp bin/sign_update
          chmod +x /tmp/bin/sign_update
          SPARKLE_OUTPUT=$(SPARKLE_PRIVATE_KEY="$SPARKLE_PRIVATE_KEY" /tmp/bin/sign_update dist/Vuvuzela.dmg)
          echo "$SPARKLE_OUTPUT"
          ED_SIG=$(echo "$SPARKLE_OUTPUT" | grep -o 'edSignature="[^"]*"' | cut -d'"' -f2)
          DMG_LENGTH=$(echo "$SPARKLE_OUTPUT" | grep -o 'length="[^"]*"' | cut -d'"' -f2)
          echo "ED_SIG=$ED_SIG" >> "$GITHUB_ENV"
          echo "DMG_LENGTH=$DMG_LENGTH" >> "$GITHUB_ENV"

      - name: Update appcast.xml
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          VERSION=${TAG#v}
          PUB_DATE=$(date -u "+%a, %d %b %Y %H:%M:%S +0000")
          DMG_URL="https://github.com/bsnkhua/vuvuzela/releases/download/${TAG}/Vuvuzela.dmg"
          # Increment CFBundleVersion from Info.plist for sparkle:version
          BUNDLE_VER=$(grep -A1 'CFBundleVersion' Resources/Info.plist | tail -1 | tr -d ' <>/string')

          cat > appcast.xml <<EOF
          <?xml version="1.0" encoding="utf-8"?>
          <rss version="2.0" xmlns:sparkle="http://www.andymatuschak.org/xml-namespaces/sparkle">
              <channel>
                  <title>Vuvuzela</title>
                  <link>https://github.com/bsnkhua/vuvuzela</link>
                  <description>FIFA World Cup 2026 desktop widget for macOS</description>
                  <language>en</language>
                  <item>
                      <title>Vuvuzela ${VERSION}</title>
                      <pubDate>${PUB_DATE}</pubDate>
                      <sparkle:version>${BUNDLE_VER}</sparkle:version>
                      <sparkle:shortVersionString>${VERSION}</sparkle:shortVersionString>
                      <sparkle:minimumSystemVersion>14.0</sparkle:minimumSystemVersion>
                      <enclosure
                          url="${DMG_URL}"
                          length="${DMG_LENGTH}"
                          type="application/octet-stream"
                          sparkle:edSignature="${ED_SIG}"
                      />
                  </item>
              </channel>
          </rss>
          EOF

          git config user.email "bsnkhua@gmail.com"
          git config user.name "Serhii Bezbabnykh"
          git add appcast.xml
          git commit -m "chore: update appcast.xml for ${TAG}"
          git push origin HEAD:main

      - name: Create release and upload DMG
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          gh release create "$TAG" --title "$TAG" --generate-notes dist/Vuvuzela.dmg
